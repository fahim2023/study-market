{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="mb-1">Complete Purchase</h2>
                    <p class="text-muted mb-4">{{ document.title }}</p>
                    <p class="fs-4 fw-bold mb-4">£{{ document.price }}</p>

                    <form id="payment-form">
                        <div id="card-element" class="form-control p-3 mb-3"></div>
                        <div id="card-errors" class="text-danger mb-3"></div>
                        <button id="submit-btn" class="btn btn-primary w-100">
                            Pay £{{ document.price }}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<div id="stripe-data"
    data-public-key="{{ stripe_public_key }}"
    data-client-secret="{{ client_secret }}"
    data-success-url="{% url 'payments:success' document.id %}"
    data-csrf-token="{{ csrf_token }}">
</div>
<script src="{% static 'payments/js/checkout.js' %}"></script>
{% endblock %}
