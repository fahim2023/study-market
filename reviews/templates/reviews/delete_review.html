{% extends "base.html" %}

{% block title %}Delete Review | StudyMarket{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="mb-1">Delete Review</h2>
            <p class="text-muted mb-4">{{ document.title }}</p>

            <p>Are you sure you want to delete your review? This action cannot be undone.</p>

            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100 mt-3">
                    Yes, Delete Review
                </button>
            </form>

            <a href="{% url 'documents:detail' document.slug %}" class="btn btn-outline-secondary w-100 mt-2">
                Cancel
            </a>
        </div>
    </div>
</div>
{% endblock %}
