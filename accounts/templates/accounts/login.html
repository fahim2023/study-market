{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Log in | StudyMarket{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm p-4">
            <h1 class="h3 mb-1">Welcome back</h1>
            <p class="text-muted mb-4">Log in to access your purchases or manage your listings.</p>

            <form method="POST" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-3">Log in</button>
            </form>

            <p class="text-center text-muted mt-3 mb-0">
                Don't have an account? <a href="{% url 'accounts:register' %}">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
